<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>8th Wall Wall AR PoC</title>

  <!--
    This product includes the XR Engine software developed by Niantic Spatial, Inc.
    Copyright © 2026 Niantic Spatial, Inc. All rights reserved.
    License: https://github.com/8thwall/engine/blob/main/LICENSE
  -->

  <link rel="stylesheet" href="./style.css" />

  <!-- 8th Wall / A-Frame stack. No npm build required. -->
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.5.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1/dist/xrextras.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/landing-page@1/dist/landing-page.js" crossorigin="anonymous"></script>
  <script async src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" crossorigin="anonymous" data-preload-chunks="slam"></script>

  <script src="./products.js"></script>
  <script src="./wall-poc.js"></script>
</head>
<body>
  <div id="hud" class="hud">
    <div class="brand">8th Wall Wall AR PoC</div>
    <div id="status" class="status">엔진 로딩 중...</div>
  </div>

  <div id="picker" class="picker">
    <button class="product selected" data-product-id="poster-60x90">
      <img src="./assets/poster-60x90.svg" alt="poster" />
      <span>60×90cm</span>
    </button>
    <button class="product" data-product-id="frame-50x70">
      <img src="./assets/frame-50x70.svg" alt="frame" />
      <span>50×70cm</span>
    </button>
  </div>

  <button id="recenter" class="recenter">다시 계산</button>

  <div id="notice" class="notice">
    <b>테스트 목적</b><br />
    이 PoC는 8th Wall SLAM + absolute scale이 iOS/Android 웹에서 안정적으로 켜지는지 확인합니다.<br />
    8th Wall은 수직/수평 표면 분류 API를 명시적으로 제공하지 않으므로, 여기서는 벽 후보를 자동 추정하고 결과를 화면에 표시합니다.
  </div>

  <a-scene
    id="scene"
    renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; alpha: true"
    xrconfig="cameraDirection: back; allowedDevices: mobile"
    xrweb="scale: absolute"
    landing-pages
    xrextras-loading
    xrextras-runtime-error
    xrextras-tap-recenter
    wall-poc-controller>

    <a-assets>
      <img id="poster-60x90-img" src="./assets/poster-60x90.svg" crossorigin="anonymous" />
      <img id="frame-50x70-img" src="./assets/frame-50x70.svg" crossorigin="anonymous" />
    </a-assets>

    <a-camera id="camera" position="0 1.6 0"></a-camera>

    <a-light type="ambient" intensity="0.9"></a-light>
    <a-light type="directional" position="0 4 2" intensity="0.6"></a-light>

    <!-- Poster is sized in meters from products.js. It is placed automatically by wall-poc-controller. -->
    <a-plane
      id="posterPlane"
      visible="false"
      position="0 1.45 -1.4"
      width="0.6"
      height="0.9"
      material="shader: flat; side: double; transparent: true; src: #poster-60x90-img"
      class="ar-poster">
    </a-plane>

    <!-- Thin border to make scale/orientation easier to judge during the test. -->
    <a-entity id="posterBorder" visible="false"></a-entity>
  </a-scene>
</body>
</html>
