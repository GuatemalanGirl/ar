<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#050505" />
  <title>Auto Wall AR</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main id="app">
    <section id="intro" class="panel">
      <div class="brand">AUTO WALL AR</div>
      <h1>벽을 비추면<br />이미지를 자동 배치합니다</h1>
      <p>
        이 버전은 수동 4점 보정이 아니라, 브라우저/SDK가 제공하는 실제 AR tracking 결과만 사용합니다.
      </p>

      <div class="product-list" id="productList" aria-label="이미지 선택"></div>

      <button id="startButton" class="primary" type="button">카메라 AR 시작</button>
      <p id="compatText" class="compat"></p>
    </section>

    <section id="arLayer" class="hidden" aria-label="AR 화면">
      <div id="rendererHost"></div>
      <div class="hud top">
        <div id="statusText">초기화 중...</div>
        <div id="metricText">거리 -- / 각도 --</div>
      </div>
      <div id="scanGuide" class="scan-guide">
        <div class="scan-box"></div>
        <p>벽 중앙을 천천히 비추세요</p>
      </div>
      <div class="hud bottom">
        <button id="replaceButton" type="button">이미지 변경</button>
        <button id="resetButton" type="button">다시 배치</button>
        <button id="captureButton" type="button">캡처</button>
      </div>
    </section>

    <div id="unsupported" class="modal hidden">
      <div class="modal-card">
        <h2>이 브라우저에서는 자동 벽면 AR을 실행할 수 없습니다</h2>
        <p id="unsupportedText"></p>
        <button id="closeUnsupported" type="button">확인</button>
      </div>
    </div>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
